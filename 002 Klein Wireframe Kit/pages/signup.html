<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="container">
        <div class="container_title">
            <div class="title">Sign up</div>
            <div class="close"><img src="../images/close.svg" alt=""></div>
        </div>
        <form action="">

            <div class="fullName">

                <div class="firstName">
                    <label for="first-name">First Name</label><br>
                    <input type="text" id="first-name" placeholder="First Name">
                </div>

                <div class="lastName">
                    <label for="last-name">Last Name</label><br>
                    <input type="text" id="last-name" placeholder="Last Name">
                </div>

            </div>

            <label for="email">E-mail</label><br>
            <input type="email" id="email" placeholder="Enter your e-mail"><br>

            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder="Create your strong password"><br>

            <label for="repeat-password">Confirm Password</label><br>
            <input type="password" id="repeat-password" placeholder="Create your strong password"><br>

            <hr>

            <label for="city">City</label><br>
            <input type="text" id="city" placeholder="Select your country"><br>

            <label for="country">Country</label><br>
            <input type="text" id="country" placeholder="Select your city"><br>

            <input type="submit" value="Signup">
        </form>
    </div>
</body>
</html>
